<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Komponen Profile dengan Tombol Edit -->
        <div class="profile-section">
            <div class="profile-avatar" id="profile-avatar">NA</div>
            <div class="profile-info">
                <h3 id="profile-name">Nama Anda</h3>
                <p id="profile-role">Web Developer / Student</p>
            </div>
            <button id="edit-profile-btn" class="edit-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                <span>Edit</span>
            </button>
        </div>

        <h1>My To-Do List</h1>

        <!-- Input Area -->
        <div class="input-section">
            <input type="text" id="todo-input" placeholder="Apa yang mau kamu lakukan hari ini?">

            <select id="priority-input">
                <option value="low">Low Priority</option>
                <option value="medium" selected>Medium Priority</option>
                <option value="high">High Priority</option>
            </select>

            <button id="add-btn">Tambah</button>
        </div>

        <!-- Task Columns (Responsive Grid) -->
        <div class="task-columns">
            <!-- Active To-Do List -->
            <div class="column">
                <h2>Agenda Hari Ini</h2>
                <ul id="active-list" class="list-container"></ul>
            </div>

            <!-- Done List -->
            <div class="column done-column">
                <h2>Done</h2>
                <ul id="done-list" class="list-container"></ul>
            </div>
        </div>

        <!-- Control Buttons -->
        <div class="control-section">
            <button id="clear-all-btn" class="danger-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                <span>Hapus Semua</span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
